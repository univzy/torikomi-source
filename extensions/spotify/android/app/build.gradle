plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.tobz.aio_extension_spotify"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion
    defaultConfig {
        applicationId "com.tobz.aio_extension_spotify"
        minSdk 23; targetSdk flutter.targetSdkVersion; versionCode 1; versionName "1.0.0"
    }
    buildTypes { release { signingConfig signingConfigs.debug; minifyEnabled false; shrinkResources false } }
}
flutter { source "../.." }
